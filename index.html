  let form = document.querySelector('form');
form.addEventListener('submit', e => {
  e.preventDefault();
  let output = document.querySelector('output');
  let firstNum  = document.querySelector('#first-num').value;
  let secondNum = document.querySelector('#second-num').value;
  let operator  = document.querySelector('#operator').value;

  try {
    if (!output) throw new Error('output element not found in DOM');

    let result = eval(`${firstNum} ${operator} ${secondNum}`);

    if (!isFinite(result)) throw new Error(`Math error: "${firstNum} ${operator} ${secondNum}" produced ${result}`);

    output.innerHTML = result;

  } catch (err) {
    console.error('Caught in try/catch:', err.message);
    if (output) output.innerHTML = `Error: ${err.message}`;

  } finally {
    console.log('finally: form submit attempt complete');
  }
});

class ValidationError extends Error {
  constructor(message, field) {
    super(message);
    this.name  = 'ValidationError';
    this.field = field;
  }
}

class MathError extends Error {
  constructor(message) {
    super(message);
    this.name = 'MathError';
  }
}

function validateAndCalculate(a, op, b) {
  if (a.trim() === '' || isNaN(Number(a))) {
    throw new ValidationError(`"${a}" is not a valid number`, 'first-num');
  }
  if (b.trim() === '' || isNaN(Number(b))) {
    throw new ValidationError(`"${b}" is not a valid number`, 'second-num');
  }
  if (op === '/' && Number(b) === 0) {
    throw new MathError('Division by zero is undefined');
  }
  return eval(`${Number(a)} ${op} ${Number(b)}`);
}

form.addEventListener('submit', e => {
  e.preventDefault();
  let output    = document.querySelector('output');
  let firstNum  = document.querySelector('#first-num').value;
  let secondNum = document.querySelector('#second-num').value;
  let operator  = document.querySelector('#operator').value;

  try {
    let result = validateAndCalculate(firstNum, operator, secondNum);
    output.innerHTML = result;
  } catch (err) {
    if (err instanceof ValidationError) {
      console.error(`[${err.name}] Field "${err.field}": ${err.message}`);
    } else if (err instanceof MathError) {
      console.error(`[${err.name}] ${err.message}`);
    } else {
      console.error('Unknown error:', err);
    }
    output.innerHTML = `${err.name}: ${err.message}`;
  }
});

window.onerror = function(message, source, lineno, colno, error) {
  console.log(`[window.onerror] "${message}" at ${source} line ${lineno}:${colno}`);
  return true; 
};
